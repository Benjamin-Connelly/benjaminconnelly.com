<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acid Smiley</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='white' stroke='black' stroke-width='3'/><g fill='black'><polygon points='50,50 39,34 50,18 61,34'/><polygon points='50,50 39,34 50,18 61,34' transform='rotate(120 50 50)'/><polygon points='50,50 39,34 50,18 61,34' transform='rotate(240 50 50)'/></g></svg>">
<style>
:root {
  --bg: #05020a;
  --primary: #ffd700;      /* acid yellow */
  --pop: #ff2dd4;          /* strobe flash */
  --fringe-cyan: #00e0ff;  /* chromatic-aberration ghost */
  --fringe-magenta: #ff00d0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); cursor: crosshair; }
canvas { display: block; }
#back {
  position: fixed; top: 16px; left: 16px; z-index: 10;
  font-family: 'Courier New', monospace; font-size: 14px;
  color: var(--primary); text-decoration: none; opacity: 0.5;
  transition: opacity 0.2s;
}
#back:hover { opacity: 1; }

#help-pill {
  position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
  background: rgba(5,2,10,0.7); border: 1px solid rgba(255,215,0,0.2);
  border-radius: 20px; padding: 6px 18px; z-index: 10;
  font: 12px 'Courier New', monospace; color: rgba(255,215,0,0.6);
  pointer-events: none; white-space: nowrap;
  transition: opacity 0.3s;
}
@supports (backdrop-filter: blur(8px)) {
  #help-pill { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); background: rgba(5,2,10,0.4); }
}
#help-pill kbd {
  font: inherit; background: rgba(255,215,0,0.14);
  border-radius: 3px; padding: 1px 5px; margin: 0 2px;
}
#help-pill .sep { margin: 0 6px; opacity: 0.3; }

#photo-warn {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  font: 10px 'Courier New', monospace;
  color: rgba(255,165,0,0.7);
  letter-spacing: 1px;
  white-space: nowrap;
  pointer-events: none; z-index: 10;
}

#modal-keys {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(5,2,10,0.7); border: 1px solid rgba(255,215,0,0.2);
  border-radius: 20px; padding: 6px 18px; z-index: 110;
  font: 12px 'Courier New', monospace; color: rgba(255,215,0,0.7);
  pointer-events: none; white-space: nowrap;
  display: none;
}
@supports (backdrop-filter: blur(8px)) {
  #modal-keys { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); background: rgba(5,2,10,0.4); }
}
#modal-backdrop.open ~ #modal-keys { display: block; }
#modal-keys kbd {
  font: inherit; background: rgba(255,215,0,0.14);
  border-radius: 3px; padding: 1px 5px; margin: 0 2px;
}
#modal-keys .sep { margin: 0 6px; opacity: 0.3; }

#modal-backdrop {
  position: fixed; inset: 0; background: rgba(5,2,10,0.9);
  z-index: 100; display: none; align-items: center; justify-content: center;
  cursor: auto;
}
@supports (backdrop-filter: blur(6px)) {
  #modal-backdrop { backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
}
#modal-backdrop.open { display: flex; }

#modal-panel {
  background: rgba(8,6,12,0.95); border: 1px solid rgba(255,215,0,0.2);
  border-radius: 12px; max-width: 720px; width: 92%; max-height: 85vh;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7); display: flex; flex-direction: column;
  position: relative;
}
#modal-panel .close {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  color: rgba(255,215,0,0.5); font: 20px 'Courier New', monospace; cursor: pointer;
  padding: 4px 8px; line-height: 1; z-index: 1;
}
#modal-panel .close:hover { color: var(--primary); }

#modal-panel h2 {
  font: 600 20px/1.3 'Courier New', monospace;
  color: var(--primary); margin: 0; padding: 28px 32px 0;
  text-transform: uppercase; letter-spacing: 2px;
}

.modal-body {
  padding: 20px 32px 28px; overflow-y: auto; max-height: 70vh;
  font: 14px/1.8 'Courier New', monospace;
  color: rgba(255,215,0,0.8);
}
.modal-body h3 {
  color: var(--primary); font-size: 14px; margin: 28px 0 8px;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 6px;
}
.modal-body h3:first-child { margin-top: 0; }
.modal-body p { margin: 0 0 14px; }
.modal-body em { color: rgba(255,215,0,0.55); font-style: italic; }
.modal-body strong { color: var(--primary); font-weight: normal; }
.modal-body blockquote {
  border-left: 2px solid rgba(255,215,0,0.35); margin: 12px 0; padding: 4px 0 4px 16px;
  color: rgba(255,215,0,0.6); font-style: italic;
}
.modal-body ul { margin: 8px 0 14px; padding-left: 20px; }
.modal-body li { margin: 4px 0; }
.modal-body li::marker { color: rgba(255,215,0,0.35); }

.modal-body::-webkit-scrollbar { width: 5px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }
.modal-body::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 3px; }
</style>
</head>
<body>
<a id="back" href="/">&lt; back</a>
<canvas id="c"></canvas>

<div id="help-pill">
  <kbd>S</kbd> strobe (hold)<span class="sep">·</span><kbd>M</kbd> history<span class="sep">·</span><kbd>?</kbd> controls
</div>
<div id="photo-warn" role="note">
  ⚠ contains strobe + sustained flashing (hold S) — may trigger photosensitive seizures
</div>

<div id="modal-backdrop">
  <div id="modal-panel">
    <button class="close" aria-label="Close">&times;</button>
    <h2 id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div id="modal-keys" aria-hidden="true">
  <kbd>j</kbd>/<kbd>k</kbd> scroll<span class="sep">·</span><kbd>gg</kbd>/<kbd>G</kbd> top/bottom<span class="sep">·</span><kbd>Esc</kbd> close
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const offscreen = document.createElement('canvas');
  const offCtx = offscreen.getContext('2d');

  const rootStyles = getComputedStyle(document.documentElement);
  const BG = rootStyles.getPropertyValue('--bg').trim();
  const PRIMARY = rootStyles.getPropertyValue('--primary').trim();
  const POP = rootStyles.getPropertyValue('--pop').trim();
  const FRINGE_CYAN = rootStyles.getPropertyValue('--fringe-cyan').trim();
  const FRINGE_MAGENTA = rootStyles.getPropertyValue('--fringe-magenta').trim();

  // Letters of "ACID" tiled across every cell, turning the grid into a
  // scanning acceptance test for the word. The rave-flyer op-art legibility
  // comes from the op-art warp below, not from a brightness ramp.
  const ACID = ['A', 'C', 'I', 'D'];
  const SCRAMBLE_RADIUS = 70;
  const SCRAMBLE_RADIUS_SQ = SCRAMBLE_RADIUS * SCRAMBLE_RADIUS;
  const PUSH_ACCEL = 520;       // px/s² applied radially when mouse is close
  const RETURN_K = 18;          // spring pulling back to home (1/s²)
  const RETURN_DAMP = 7.5;      // velocity decay (1/s)
  const BRIGHTNESS_FLOOR = 0.05;

  const WINK_PERIOD_S = 8.0;
  const WINK_DURATION_S = 0.18;

  // Strobe: tap = single 220ms flash. Hold = sustained hallucination that
  // ramps up over ~1.2s into color cycling, trails, warp spike, chromatic
  // explosion, letter chaos, face shudder, and a periodic third eye.
  // Safety cap at 15s auto-releases even if the key stays held.
  const STROBE_FLASH_MS = 220;
  const STROBE_RAMP_MS = 1200;
  const STROBE_TAIL_MS = 700;
  const STROBE_MAX_HOLD_MS = 15000;

  // Fluorescent rave palette — cycled as face color under peak strobe. Mix
  // of UV-reactive tones (Alex Grey aura / Android Jones digital fractal
  // references) plus acid-house yellow as the home color.
  const PSYCH_PALETTE = [
    '#ff00d0', '#00ffdf', '#aeff00', '#ff6a00',
    '#7c00ff', '#ff0066', '#00ff9c', '#ffd700',
  ];

  const PREFERS_REDUCED_MOTION = typeof matchMedia === 'function'
    && matchMedia('(prefers-reduced-motion: reduce)').matches;

  let particles = [];
  let cellSize = 9;
  let mouseX = 0, mouseY = 0, mouseActive = false;
  let dpr = 1, W, H;
  let lastTime = 0;

  // Strobe state — two paths: an immediate flash (tap) and a held chaos
  // mode (hold). A single `strobeIntensity` smooths between them so the
  // render code can just read one 0–1 dial.
  let strobeFlashUntil = 0;
  let strobeHoldActive = false;
  let strobeHoldStart = 0;
  let strobeReleaseAt = 0;
  let strobeIntensity = 0;

  // Eye-region geometry, recomputed each resize. Used for the wink overlay.
  let leftEyeX = 0, rightEyeX = 0, eyeY = 0;

  let imageData = null;

  // ─ Draw the melted ☻ silhouette at full offscreen resolution ─────────────
  // Not a clean corporate smiley — the 1988 acid-house version warped on
  // dance floors under LSD: drippy features, uneven eyes, soft edge wobble.
  function drawSmiley(w, h) {
    offscreen.width = w;
    offscreen.height = h;
    offCtx.clearRect(0, 0, w, h);

    // Reserve the bottom strip for the help pill + photo-warn so the face
    // doesn't get cut off by them as the viewport grows. 96 CSS-px is the
    // pill (28) + warn (20) + spacing above/below (44 + 4). Scale by dpr
    // because w/h here are physical pixels.
    const bottomReserve = 96 * dpr;
    const usableH = Math.max(h * 0.5, h - bottomReserve);
    const size = Math.min(w, usableH) * 0.78;
    const cx = w / 2;
    const cy = usableH / 2;
    const r = size / 2;

    // Face disc — radial shading + irregular edge (low-frequency wobble).
    // Sampled only for brightness, so color doesn't matter here.
    const grd = offCtx.createRadialGradient(cx - r * 0.2, cy - r * 0.3, r * 0.1, cx, cy, r);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.85, '#e0e0e0');
    grd.addColorStop(1, '#a0a0a0');
    offCtx.fillStyle = grd;
    offCtx.beginPath();
    const pts = 64;
    for (let i = 0; i <= pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      const rr = r * (1 + 0.022 * Math.sin(a * 7 + 1.3) + 0.016 * Math.cos(a * 11 - 0.4));
      const px = cx + Math.cos(a) * rr;
      const py = cy + Math.sin(a) * rr;
      if (i === 0) offCtx.moveTo(px, py);
      else offCtx.lineTo(px, py);
    }
    offCtx.closePath();
    offCtx.fill();

    // Eyes — asymmetric ellipses (not circles). Left eye slightly wider,
    // right eye slightly taller — subtly off-kilter, not obviously broken.
    offCtx.fillStyle = '#000';
    const eDX = r * 0.33;
    const eY  = cy - r * 0.18;
    const eR  = r * 0.11;
    offCtx.beginPath();
    offCtx.ellipse(cx - eDX, eY, eR * 1.12, eR * 0.95, 0.05, 0, Math.PI * 2);
    offCtx.ellipse(cx + eDX, eY, eR * 0.95, eR * 1.08, -0.05, 0, Math.PI * 2);
    offCtx.fill();

    // Melt drips under each eye — black teardrop trailing down, uneven.
    offCtx.fillStyle = '#000';
    for (const ex of [cx - eDX, cx + eDX]) {
      const dripLen = r * (0.16 + 0.08 * (ex < cx ? 1 : 0.6));
      offCtx.beginPath();
      offCtx.moveTo(ex - eR * 0.35, eY);
      offCtx.quadraticCurveTo(ex - eR * 0.1, eY + dripLen * 0.9, ex, eY + dripLen);
      offCtx.quadraticCurveTo(ex + eR * 0.1, eY + dripLen * 0.9, ex + eR * 0.35, eY);
      offCtx.closePath();
      offCtx.fill();
    }

    // Melty mouth — three overlapping arcs at slight offsets give organic,
    // uneven thickness (not a perfect clean stroke). Plus a drip globule
    // hanging off the right corner.
    offCtx.strokeStyle = '#000';
    offCtx.lineCap = 'round';
    const mCy = cy + r * 0.07;
    const mR  = r * 0.52;
    for (let j = 0; j < 3; j++) {
      offCtx.lineWidth = r * (0.075 + j * 0.012);
      offCtx.beginPath();
      offCtx.arc(cx + (j - 1) * r * 0.012,
                 mCy + (j - 1) * r * 0.01,
                 mR * (1 + (j - 1) * 0.018),
                 0.17 * Math.PI, 0.83 * Math.PI, false);
      offCtx.stroke();
    }
    // Right-corner drip
    const dripA = 0.83 * Math.PI;
    const dripX = cx + Math.cos(dripA) * mR;
    const dripY = mCy + Math.sin(dripA) * mR;
    offCtx.fillStyle = '#000';
    offCtx.beginPath();
    offCtx.moveTo(dripX - r * 0.025, dripY);
    offCtx.quadraticCurveTo(dripX, dripY + r * 0.11, dripX + r * 0.02, dripY + r * 0.13);
    offCtx.quadraticCurveTo(dripX + r * 0.04, dripY + r * 0.11, dripX + r * 0.025, dripY);
    offCtx.closePath();
    offCtx.fill();

    return { cx, cy, r, eDX, eY };
  }

  function sampleBrightness(px, py) {
    if (!imageData) return 0;
    // Use the INTEGER canvas pixel width for stride; W * dpr is fractional
    // on non-integer DPR and produces drifting off-by-N sampling.
    const stride = canvas.width;
    if (px < 0 || px >= stride || py < 0 || py >= canvas.height) return 0;
    const idx = (py * stride + px) * 4;
    return (0.299 * imageData[idx] + 0.587 * imageData[idx + 1] + 0.114 * imageData[idx + 2]) / 255;
  }

  function init() {
    const geo = drawSmiley(canvas.width, canvas.height);
    imageData = offCtx.getImageData(0, 0, canvas.width, canvas.height).data;

    // Eye geometry in CSS pixels for the wink overlay
    leftEyeX  = (geo.cx - geo.eDX) / dpr;
    rightEyeX = (geo.cx + geo.eDX) / dpr;
    eyeY      = geo.eY / dpr;

    cellSize = Math.max(9, Math.round(12 * (W / 1280)));
    const cols = Math.ceil(W / cellSize);
    const rows = Math.ceil(H / cellSize);
    particles = [];

    // Grid fills the WHOLE canvas — not just the face silhouette. BG cells
    // render dim rust; face cells render bright yellow. Both undergo the
    // same barrel warp at render time. This is what buys the op-art vertigo
    // — the grid-wide distortion — not any single-particle trick.
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const hx = col * cellSize + cellSize / 2;
        const hy = row * cellSize + cellSize / 2;
        const b = sampleBrightness(Math.round(hx * dpr), Math.round(hy * dpr));
        const isFace = b > BRIGHTNESS_FLOOR;

        // Checkerboard thinning + a little randomness for BG cells keeps
        // fillText counts reasonable on mobile without flattening the grid.
        if (!isFace) {
          if ((col + row) & 1) continue;
          if (Math.random() < 0.15) continue;
        }

        const acidIdx = col & 3;  // col % 4 — letters read left-to-right
        particles.push({
          x: hx, y: hy,
          vx: 0, vy: 0,
          hx, hy,
          brightness: isFace ? b : (0.55 + 0.2 * Math.random()),
          acidIdx,
          restChar: ACID[acidIdx],
          char: ACID[acidIdx],
          isFace,
          scramble: 0,
          phase: Math.random() * Math.PI * 2,
        });
      }
    }
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    init();
  }

  let resizeTimer = 0;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 80);
  });
  resize();

  // ─ Input ──────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY; mouseActive = true;
  });
  canvas.addEventListener('mouseleave', () => { mouseActive = false; });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; mouseActive = true;
  }, { passive: false });
  canvas.addEventListener('touchend', () => { mouseActive = false; });
  // 3-finger tap = single flash. Hold with 3 fingers = sustained chaos.
  canvas.addEventListener('touchstart', e => {
    if (PREFERS_REDUCED_MOTION) return;
    if (e.touches.length === 3) {
      strobeFlashUntil = performance.now() + STROBE_FLASH_MS;
      strobeHoldActive = true;
      strobeHoldStart = performance.now();
    }
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (strobeHoldActive && e.touches.length < 3) {
      strobeHoldActive = false;
      strobeReleaseAt = performance.now();
    }
  });
  canvas.addEventListener('touchcancel', () => {
    if (strobeHoldActive) {
      strobeHoldActive = false;
      strobeReleaseAt = performance.now();
    }
  });

  // ─ Update / render ────────────────────────────────────────────────────────
  function update(dt, time) {
    const tSec = time / 1000;

    for (let i = 0, n = particles.length; i < n; i++) {
      const p = particles[i];

      if (mouseActive) {
        const dx = p.x - mouseX, dy = p.y - mouseY;
        const d2 = dx * dx + dy * dy;
        if (d2 < SCRAMBLE_RADIUS_SQ) {
          const d = Math.sqrt(d2) || 0.001;
          const proximity = 1 - d / SCRAMBLE_RADIUS;
          const accel = PUSH_ACCEL * proximity * proximity;
          p.vx += (dx / d) * accel * dt;
          p.vy += (dy / d) * accel * dt;
          p.scramble = Math.min(1, p.scramble + proximity * 0.5);
        }
      }

      // Spring back to home + damping (semi-implicit)
      p.vx += (p.hx - p.x) * RETURN_K * dt;
      p.vy += (p.hy - p.y) * RETURN_K * dt;
      const damp = Math.exp(-RETURN_DAMP * dt);
      p.vx *= damp;
      p.vy *= damp;
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      p.scramble = Math.max(0, p.scramble - 2.0 * dt);

      // Scramble cycles the particle's char through ACID letters (A↔C↔I↔D)
      // instead of rotating through a brightness ramp.
      if (p.scramble > 0.05 && Math.random() < p.scramble * 0.8) {
        const dir = Math.random() < 0.5 ? 1 : 3;  // +1 or -1 mod 4
        p.char = ACID[(p.acidIdx + dir) & 3];
      } else {
        p.char = p.restChar;
      }

      if (!PREFERS_REDUCED_MOTION && Math.random() < 0.0008 && p.scramble < 0.01) {
        p.scramble = 0.15 + Math.random() * 0.2;
      }
    }

    // Wink bookkeeping — phase within the period, used by render()
    const winkPhase = tSec % WINK_PERIOD_S;
    return { winking: !PREFERS_REDUCED_MOTION && winkPhase < WINK_DURATION_S };
  }

  // Smooth strobeIntensity toward its target. Hold ramps 0→1 over
  // STROBE_RAMP_MS; release decays 1→0 over STROBE_TAIL_MS. Auto-release
  // after 15 s even if the key stays down (seizure safety cap).
  function updateStrobeIntensity(time) {
    if (strobeHoldActive && time - strobeHoldStart > STROBE_MAX_HOLD_MS) {
      strobeHoldActive = false;
      strobeReleaseAt = time;
    }
    let target;
    if (strobeHoldActive) {
      target = Math.min(1, (time - strobeHoldStart) / STROBE_RAMP_MS);
    } else if (strobeReleaseAt > 0) {
      const elapsed = time - strobeReleaseAt;
      target = Math.max(0, 1 - elapsed / STROBE_TAIL_MS);
      if (target <= 0) strobeReleaseAt = 0;
    } else {
      target = 0;
    }
    strobeIntensity += (target - strobeIntensity) * 0.18;
    if (strobeIntensity < 0.002) strobeIntensity = 0;
  }

  function render(state, time) {
    updateStrobeIntensity(time);
    const s = strobeIntensity;              // 0..1 chaos dial
    const flash = time < strobeFlashUntil;  // brief tap flash
    const cx = W / 2, cy = H / 2;
    const maxD2 = (W * W + H * H) / 4;

    // ── Clear: trails build up with intensity (palinopsia) ────────────────
    // At s=0 we fully clear each frame. At s=1 only ~12% of the prior
    // frame is dimmed, so letters smear into trails — the defining LSD
    // visual effect (after-images, per PsychonautWiki).
    if (flash && s < 0.3) {
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
    } else if (s > 0.001) {
      // Heartbeat white-flash at peak (~12 Hz beat).
      const beat = Math.sin(time * 0.024);
      if (s > 0.45 && beat > 0.55) {
        ctx.fillStyle = `rgba(255,255,255,${(0.12 + 0.28 * s).toFixed(3)})`;
      } else {
        const clearA = 0.12 + 0.88 * (1 - s);  // s=0→1.0, s=1→0.12
        ctx.fillStyle = `rgba(5,2,10,${clearA.toFixed(3)})`;
      }
    } else {
      ctx.fillStyle = BG;
    }
    ctx.fillRect(0, 0, W, H);

    ctx.font = cellSize + 'px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // ── Color palette cycling ─────────────────────────────────────────────
    // V1/V2 hyperactivity → saturated cycling colors (Alex Grey auras,
    // Android Jones digital fractals). Below s=0.15 we stay in the home
    // yellow so a quick tap doesn't shift the scheme.
    const palIdx = Math.floor(time * 0.008) & 7;
    const faceColor = s > 0.15 ? PSYCH_PALETTE[palIdx] : PRIMARY;
    const bgHex = s > 0.25 ? PSYCH_PALETTE[(palIdx + 3) & 7] : null;

    // ── Warp + chromatic escalate with intensity ─────────────────────────
    const warpBase = PREFERS_REDUCED_MOTION ? 0 : 0.38 + 0.25 * Math.sin(time * 0.00035);
    const warpK = warpBase + s * 1.1 * Math.abs(Math.sin(time * 0.014));
    const tripBase = PREFERS_REDUCED_MOTION ? 0 : 0.6 + 1.4 * (1 + Math.sin(time * 0.00028));
    const trip = tripBase + s * 11 * (0.4 + 0.6 * Math.abs(Math.sin(time * 0.019)));

    // Letter scroll every 1.8 s + faster chaos jitter at peak.
    const shift = PREFERS_REDUCED_MOTION ? 0 : Math.floor(time / 1800) & 3;
    const chaosShift = s > 0.35 ? (Math.floor(time * 0.04) & 3) : 0;

    // Face shudder — per-frame sub-pixel jitter at peak.
    const shudAmp = s > 0.4 ? s * 3.5 : 0;
    const shudX = shudAmp ? (Math.random() - 0.5) * shudAmp : 0;
    const shudY = shudAmp ? (Math.random() - 0.5) * shudAmp : 0;

    // ── Pass 1: background grid cells ─────────────────────────────────────
    if (bgHex) {
      ctx.fillStyle = bgHex;
      for (let i = 0, n = particles.length; i < n; i++) {
        const p = particles[i];
        if (p.isFace) continue;
        const dx = p.x - cx, dy = p.y - cy;
        const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
        ctx.globalAlpha = p.brightness * (0.55 + 0.25 * s);
        const idx = (p.acidIdx + shift + chaosShift + (s > 0.6 && Math.random() < 0.3 ? 1 : 0)) & 3;
        ctx.fillText(ACID[idx], cx + dx * factor, cy + dy * factor);
      }
    } else {
      ctx.fillStyle = flash ? 'rgba(255,255,255,0.55)' : 'rgba(230,75,0,0.72)';
      for (let i = 0, n = particles.length; i < n; i++) {
        const p = particles[i];
        if (p.isFace) continue;
        const dx = p.x - cx, dy = p.y - cy;
        const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
        ctx.globalAlpha = p.brightness;
        ctx.fillText(ACID[(p.acidIdx + shift) & 3], cx + dx * factor, cy + dy * factor);
      }
    }

    // ── Pass 2: chromatic fringes on face cells ──────────────────────────
    if (trip > 0) {
      ctx.fillStyle = FRINGE_CYAN;
      for (let i = 0, n = particles.length; i < n; i++) {
        const p = particles[i];
        if (!p.isFace) continue;
        const dx = p.x - cx, dy = p.y - cy;
        const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
        ctx.globalAlpha = p.brightness * (0.55 + 0.25 * s);
        const idx = (p.acidIdx + shift + chaosShift) & 3;
        ctx.fillText(ACID[idx], cx + dx * factor - trip + shudX, cy + dy * factor + shudY);
      }
      ctx.fillStyle = FRINGE_MAGENTA;
      for (let i = 0, n = particles.length; i < n; i++) {
        const p = particles[i];
        if (!p.isFace) continue;
        const dx = p.x - cx, dy = p.y - cy;
        const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
        ctx.globalAlpha = p.brightness * (0.55 + 0.25 * s);
        const idx = (p.acidIdx + shift + chaosShift) & 3;
        ctx.fillText(ACID[idx], cx + dx * factor + trip + shudX, cy + dy * factor + shudY);
      }
    }

    // ── Pass 3: face cells — main color on top ───────────────────────────
    ctx.fillStyle = faceColor;
    for (let i = 0, n = particles.length; i < n; i++) {
      const p = particles[i];
      if (!p.isFace) continue;
      const dx = p.x - cx, dy = p.y - cy;
      const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
      ctx.globalAlpha = flash ? 1 : p.brightness;
      let idx = (p.acidIdx + shift + chaosShift) & 3;
      // Letter chaos — some cells randomly reassign each frame at peak.
      if (s > 0.55 && Math.random() < 0.18) idx = (idx + 1 + (Math.random() * 3 | 0)) & 3;
      ctx.fillText(ACID[idx], cx + dx * factor + shudX, cy + dy * factor + shudY);
    }
    ctx.globalAlpha = 1;

    // ── Third eye — opens during peak (Alex Grey / DMT motif) ────────────
    // Appears between the two normal eyes, above the brow. Independent
    // rhythm so it reads as emerging rather than syncing to anything.
    if (s > 0.5) {
      const thirdPulse = Math.sin(time * 0.005) + s;
      if (thirdPulse > 0.8) {
        const teX = (leftEyeX + rightEyeX) / 2;
        const teY = eyeY - cellSize * 4.2;
        const dx = teX - cx, dy = teY - cy;
        const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
        ctx.fillStyle = faceColor;
        ctx.globalAlpha = Math.min(1, (thirdPulse - 0.8) * 2.5);
        ctx.fillText('O', cx + dx * factor + shudX,
                          cy + dy * factor + shudY);
        ctx.fillText('O', cx + dx * factor - cellSize * 1.1 + shudX,
                          cy + dy * factor + shudY);
        ctx.fillText('O', cx + dx * factor + cellSize * 1.1 + shudX,
                          cy + dy * factor + shudY);
        ctx.globalAlpha = 1;
      }
    }

    // Wink overlay — warped, same color pass as face.
    if (state.winking) {
      ctx.fillStyle = faceColor;
      ctx.globalAlpha = 1;
      for (const ex of [leftEyeX, rightEyeX]) {
        for (let k = -2; k <= 2; k++) {
          const px = ex + k * cellSize;
          const dx = px - cx, dy = eyeY - cy;
          const factor = 1 + warpK * (dx * dx + dy * dy) / maxD2;
          ctx.fillText('D', cx + dx * factor, cy + dy * factor);
        }
      }
    }
  }

  function frame(time) {
    requestAnimationFrame(frame);
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;
    if (document.hidden) return;
    const state = update(dt, time);
    render(state, time);
  }
  requestAnimationFrame(frame);

  // ─ Modals ─────────────────────────────────────────────────────────────────
  const modalBackdrop = document.getElementById('modal-backdrop');
  const modalTitle = document.getElementById('modal-title');
  const modalBodyEl = document.getElementById('modal-body');
  const modalClose = modalBackdrop.querySelector('.close');
  let modalOpen = false;

  function openModal(title, contentFn) {
    modalTitle.textContent = title;
    modalBodyEl.textContent = '';
    contentFn(modalBodyEl);
    modalBackdrop.classList.add('open');
    modalOpen = true;
  }
  function closeModal() {
    modalBackdrop.classList.remove('open');
    modalOpen = false;
  }
  modalClose.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', e => {
    if (e.target === modalBackdrop) closeModal();
  });

  // DOM helpers — same style as tb303.html for consistency
  function h3(parent, text) { const el = document.createElement('h3'); el.textContent = text; parent.appendChild(el); }
  function p(parent, parts) {
    const el = document.createElement('p');
    if (typeof parts === 'string') { el.textContent = parts; }
    else {
      parts.forEach(part => {
        if (typeof part === 'string') el.appendChild(document.createTextNode(part));
        else if (part.strong) { const s = document.createElement('strong'); s.textContent = part.strong; el.appendChild(s); }
        else if (part.em)     { const e = document.createElement('em');     e.textContent = part.em;     el.appendChild(e); }
      });
    }
    parent.appendChild(el);
  }
  function quote(parent, text) { const el = document.createElement('blockquote'); el.textContent = text; parent.appendChild(el); }
  function ul(parent, items) {
    const list = document.createElement('ul');
    items.forEach(item => {
      const li = document.createElement('li');
      if (typeof item === 'string') li.textContent = item;
      else item.forEach(part => {
        if (typeof part === 'string') li.appendChild(document.createTextNode(part));
        else if (part.strong) { const s = document.createElement('strong'); s.textContent = part.strong; li.appendChild(s); }
      });
      list.appendChild(li);
    });
    parent.appendChild(list);
  }

  function historyContent(el) {
    h3(el, 'A Face Before Acid');
    p(el, [
      'The round yellow smiley predates acid house by a quarter century. In 1963, ',
      {strong: 'Harvey Ball'}, ', a graphic designer in Worcester, Massachusetts, was paid $45 by State Mutual Life Assurance to boost employee morale after a bruising merger. He drew the face in ten minutes. He never trademarked it.'
    ]);
    p(el, [
      'By the 1970s, the Spain brothers in Philadelphia slapped ', {em: 'HAVE A HAPPY DAY'}, ' under it and moved fifty million units. It became shorthand for corporate cheerfulness — flat, obedient, inoffensive. Exactly the thing a youth movement would eventually want to detourn.'
    ]);

    h3(el, 'Britain, 1988');
    p(el, [
      'When acid house crossed from Chicago to Britain in late 1987, it arrived without iconography. Early imports were bootlegged 12-inches with hand-stamped labels. The movement needed a face.'
    ]);
    p(el, [
      'That face turned up on ', {strong: 'Bomb The Bass'}, '\u2019s "Beat Dis" (February 1988, #2 UK), whose sleeve featured a smiley riddled with bullet holes. Weeks later ', {strong: 'Danny Rampling'}, '\u2019s Shoom nights at the Fitness Centre on Southwark Street plastered the face across flyers and T-shirts. By summer the smiley was everywhere — Haçienda regulars wore it, Boy George wore it, warehouse parties painted it fifteen feet tall on arch walls outside London. Ravers drew it with a finger on fogged club-bathroom mirrors.'
    ]);

    h3(el, 'Why This Face, Why Then');
    p(el, 'The smiley worked because it held three readings at once — and the acid house scene could hold all three simultaneously.');
    ul(el, [
      [{strong: 'Sincere: '}, 'the empathogenic effect of MDMA mapped onto a face that was already trying to smile back at you. Ravers hugging strangers on a Hackney dance floor at 4am meant the smile more than the corporate origin ever did.'],
      [{strong: 'Ironic: '}, 'in Thatcher\u2019s Britain — mass unemployment, miners\u2019 strike still raw — a forced corporate grin was already a dark joke before you added anything.'],
      [{strong: 'Pharmacological: '}, 'the yellow pill imagery was deliberate and everyone knew it. Dealers stamped smileys into ecstasy tablets. The symbol and the substance became the same shape.']
    ]);

    h3(el, 'The Moral Panic');
    p(el, [
      'In October 1988, ', {em: 'The Sun'}, ' ran "SHOOM! The Cosmic Crusaders" calling the scene a harmless new craze. Ten days later the same paper flipped: "EVIL OF ECSTASY" on the front page.'
    ]);
    p(el, [
      'Within months, Top Shop pulled smiley T-shirts. Smiley badges were grounds for ejection from pubs. ', {strong: 'BBC Radio 1'}, ' banned tracks with "acid" in the title. Police powers expanded; warehouse-party organizers were arrested under 1930s-era entertainment licensing laws. The 1994 Criminal Justice and Public Order Act — specifically criminalizing gatherings around "music wholly or predominantly characterized by the emission of a succession of repetitive beats" — was the endgame of a five-year institutional freakout.'
    ]);
    quote(el, '"A kind of pouting, contemptuous smile, as if to say: we know what you think of us and we don\u2019t care."');

    h3(el, 'After');
    p(el, [
      'Watchmen (1986) put a blood-splattered smiley on the cover of issue #1 — that image pre-dated the acid house appropriation by two years but looped back into it. ', {strong: 'Alan Moore'}, ' was not pleased when rave flyers lifted it.'
    ]);
    p(el, [
      'By 1994 the smiley had been so thoroughly absorbed into youth culture that it stopped being legible as acid-house shorthand. It became ambient — airport souvenirs, kid\u2019s stickers, emoji. The specifically ', {em: 'acid'}, ' smiley survives in niches: hardstyle record labels, French touch covers, Supreme drops that sampled Futura\u2019s 1988 flyers for Shoom.'
    ]);
  }

  function controlsContent(el) {
    h3(el, 'Keyboard');
    ul(el, [
      [{strong: 'S'}, ' \u2014 Strobe flash'],
      [{strong: 'M'}, ' \u2014 History & why this face'],
      [{strong: '?'}, ' \u2014 This help'],
      [{strong: 'Esc'}, ' \u2014 Close modal']
    ]);
    h3(el, 'Touch');
    ul(el, [
      '1 finger: push particles around',
      '3 fingers: strobe flash'
    ]);
    h3(el, 'Modal Navigation');
    ul(el, [
      [{strong: 'j / \u2193'}, ' \u2014 Scroll down'],
      [{strong: 'k / \u2191'}, ' \u2014 Scroll up'],
      [{strong: 'gg'}, ' \u2014 Jump to top'],
      [{strong: 'G'}, ' \u2014 Jump to bottom']
    ]);
  }

  const SCROLL_STEP = 60;
  const GG_WINDOW_MS = 500;  // `gg` = two g presses within this window
  let lastGPressAt = 0;
  // KEYMAP covers discrete (tap-only) keys. S is special — handled below
  // via keydown + keyup with e.repeat filtering so "hold" maps to the
  // sustained hallucination mode.
  const KEYMAP = {
    'm': () => openModal('☻  Acid Smiley', historyContent),
    '?': () => openModal('Controls', controlsContent),
    'Escape': closeModal,
  };

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (modalOpen) {
      switch (e.code) {
        case 'KeyJ': case 'ArrowDown': e.preventDefault(); modalBodyEl.scrollBy(0, SCROLL_STEP); return;
        case 'KeyK': case 'ArrowUp':   e.preventDefault(); modalBodyEl.scrollBy(0, -SCROLL_STEP); return;
        case 'KeyG':
          e.preventDefault();
          if (e.shiftKey) {
            // G — jump to bottom (vim standard).
            modalBodyEl.scrollTo(0, modalBodyEl.scrollHeight);
            lastGPressAt = 0;
          } else {
            // gg — second g within GG_WINDOW_MS jumps to top.
            const now = performance.now();
            if (now - lastGPressAt < GG_WINDOW_MS) {
              modalBodyEl.scrollTo(0, 0);
              lastGPressAt = 0;
            } else {
              lastGPressAt = now;
            }
          }
          return;
        case 'Escape':                  e.preventDefault(); closeModal(); return;
      }
      const h = KEYMAP[e.key] || KEYMAP[e.key.toLowerCase()];
      if (h && e.key !== 'Escape') { closeModal(); setTimeout(h, 50); }
      return;
    }

    // Strobe / hold chaos — gated on prefers-reduced-motion for safety.
    if (e.code === 'KeyS' && !PREFERS_REDUCED_MOTION) {
      e.preventDefault();
      // Fire the single flash on EVERY fresh press (tap).
      if (!e.repeat) {
        strobeFlashUntil = performance.now() + STROBE_FLASH_MS;
        if (!strobeHoldActive) {
          strobeHoldActive = true;
          strobeHoldStart = performance.now();
        }
      }
      return;
    }

    const h = KEYMAP[e.key] || KEYMAP[e.key.toLowerCase()];
    if (h) { e.preventDefault(); h(); }
  });

  document.addEventListener('keyup', e => {
    if (e.code === 'KeyS' && strobeHoldActive) {
      strobeHoldActive = false;
      strobeReleaseAt = performance.now();
      e.preventDefault();
    }
  });

  // If focus leaves the window while the key is held, release immediately.
  window.addEventListener('blur', () => {
    if (strobeHoldActive) {
      strobeHoldActive = false;
      strobeReleaseAt = performance.now();
    }
  });
})();
</script>
</body>
</html>
