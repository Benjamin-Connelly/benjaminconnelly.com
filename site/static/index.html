<script>
(function() {
  'use strict';

  // --- Mirrorball preview: spinning disco ball with reflected light ---
  const mbCanvas = document.getElementById('mirrorball-preview');
  const mbCtx = mbCanvas.getContext('2d');

  function initMirrorball() {
    const dpr = window.devicePixelRatio || 1;
    const rect = mbCanvas.getBoundingClientRect();
    mbCanvas.width = rect.width * dpr;
    mbCanvas.height = rect.height * dpr;
    mbCtx.scale(dpr, dpr);
    return { w: rect.width, h: rect.height };
  }

  let mbSize = initMirrorball();
  const mirrorTiles = [];

  // Generate tile positions on a sphere
  for (let lat = -80; lat <= 80; lat += 12) {
    const r = Math.cos(lat * Math.PI / 180);
    const circumference = Math.max(1, Math.round(r * 28));
    for (let i = 0; i < circumference; i++) {
      const lon = (i / circumference) * 360;
      mirrorTiles.push({
        lat: lat * Math.PI / 180,
        lon: lon * Math.PI / 180,
        flicker: Math.random()
      });
    }
  }

  function drawMirrorball(time) {
    const w = mbSize.w, h = mbSize.h;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.35;
    const rot = time * 0.0004;

    mbCtx.fillStyle = '#000';
    mbCtx.fillRect(0, 0, w, h);

    // Spotlight glow
    const grad = mbCtx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.4);
    grad.addColorStop(0, 'rgba(255,255,255,0.04)');
    grad.addColorStop(1, 'transparent');
    mbCtx.fillStyle = grad;
    mbCtx.fillRect(0, 0, w, h);

    // Reflected light beams
    const beamCount = 12;
    for (let i = 0; i < beamCount; i++) {
      const angle = rot * 2 + (i / beamCount) * Math.PI * 2;
      const bx = cx + Math.cos(angle) * radius * 2.5;
      const by = cy + Math.sin(angle) * radius * 2.5;
      const pulse = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.002 + i));
      mbCtx.beginPath();
      mbCtx.arc(bx, by, 3 + pulse * 4, 0, Math.PI * 2);
      mbCtx.fillStyle = `rgba(255,255,255,${0.15 * pulse})`;
      mbCtx.fill();
    }

    // Ball
    for (let i = 0; i < mirrorTiles.length; i++) {
      const t = mirrorTiles[i];
      const x3d = Math.cos(t.lat) * Math.sin(t.lon + rot);
      const y3d = Math.sin(t.lat);
      const z3d = Math.cos(t.lat) * Math.cos(t.lon + rot);

      if (z3d < -0.1) continue;

      const screenX = cx + x3d * radius;
      const screenY = cy + y3d * radius;
      const size = (z3d + 1) * 2.5 + 1;

      // Specular highlight based on angle to light source (top-right)
      const lightAngle = x3d * 0.5 + y3d * -0.5 + z3d * 0.7;
      const specular = Math.max(0, lightAngle);
      const flicker = 0.5 + 0.5 * Math.sin(time * 0.003 + t.flicker * 20);

      const brightness = Math.round((specular * 0.7 + 0.15 + flicker * 0.15) * 255);
      const r = Math.min(255, brightness);
      const g = Math.min(255, Math.round(brightness * 0.95));
      const b = Math.min(255, Math.round(brightness * 1.1));

      mbCtx.fillStyle = `rgb(${r},${g},${b})`;
      mbCtx.fillRect(screenX - size / 2, screenY - size / 2, size, size);
    }
  }

  // --- Smiley preview: draw ☻ shape, sample as ASCII ---
  const smCanvas = document.getElementById('smiley-preview');
  const smCtx = smCanvas.getContext('2d');
  const smOff = document.createElement('canvas');
  const smOffCtx = smOff.getContext('2d');

  const SM_BG = '#05020a';
  const SM_YELLOW = '#ffd700';
  const SM_CYAN = '#00e0ff';
  const SM_MAGENTA = '#ff00d0';
  // Preview tiles "ACID" across the face (matches /smiley.html aesthetic).
  // No BG grid or barrel warp in the card — the full page carries that load;
  // at 280×280 the warp is too subtle to read and the BG grid clutters.
  const SM_ACID = ['A', 'C', 'I', 'D'];

  let smCells = [];
  let smImageData = null;
  let smEyeGeo = null;  // { eyeLX, eyeRX, eyeY, cellSize } for wink overlay

  function drawSmileyOff(w, h) {
    smOff.width = w;
    smOff.height = h;
    smOffCtx.clearRect(0, 0, w, h);

    const size = Math.min(w, h) * 0.82;
    const cx = w / 2, cy = h / 2;
    const r = size / 2;

    // Yellow face disc (sampled by brightness only — color is irrelevant here)
    const grd = smOffCtx.createRadialGradient(cx - r * 0.2, cy - r * 0.3, r * 0.1, cx, cy, r);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.85, '#e0e0e0');
    grd.addColorStop(1, '#a0a0a0');
    smOffCtx.fillStyle = grd;
    smOffCtx.beginPath();
    smOffCtx.arc(cx, cy, r, 0, Math.PI * 2);
    smOffCtx.fill();

    // Eyes (black voids)
    const eDX = r * 0.33;
    const eY  = cy - r * 0.18;
    const eR  = r * 0.11;
    smOffCtx.fillStyle = '#000';
    smOffCtx.beginPath();
    smOffCtx.arc(cx - eDX, eY, eR, 0, Math.PI * 2);
    smOffCtx.arc(cx + eDX, eY, eR, 0, Math.PI * 2);
    smOffCtx.fill();

    // Mouth arc
    smOffCtx.strokeStyle = '#000';
    smOffCtx.lineWidth = r * 0.10;
    smOffCtx.lineCap = 'round';
    smOffCtx.beginPath();
    smOffCtx.arc(cx, cy + r * 0.07, r * 0.52, 0.18 * Math.PI, 0.82 * Math.PI, false);
    smOffCtx.stroke();

    return { cx, cy, r, eDX, eY };
  }

  function initSmileyPreview() {
    const dpr = window.devicePixelRatio || 1;
    const rect = smCanvas.getBoundingClientRect();
    smCanvas.width = rect.width * dpr;
    smCanvas.height = rect.height * dpr;
    smCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const size = { w: rect.width, h: rect.height };

    const geo = drawSmileyOff(rect.width * dpr, rect.height * dpr);
    const raw = smOffCtx.getImageData(0, 0, rect.width * dpr, rect.height * dpr);
    smImageData = raw.data;

    const cellSize = Math.max(4, Math.round(5 * (size.w / 280)));
    const cols = Math.ceil(size.w / cellSize);
    const rows = Math.ceil(size.h / cellSize);
    smCells = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const homeX = c * cellSize + cellSize / 2;
        const homeY = r * cellSize + cellSize / 2;
        const sx = Math.round(homeX * dpr);
        const sy = Math.round(homeY * dpr);
        if (sx < 0 || sx >= smCanvas.width || sy < 0 || sy >= smCanvas.height) continue;
        // Use the INTEGER canvas pixel width for stride — `rect.width * dpr`
        // is fractional on non-integer DPRs (e.g. 1.04 in Playwright) and
        // produces off-by-N sampling that bleeds outside the disc.
        const idx = (sy * smCanvas.width + sx) * 4;
        const brightness = (0.299 * smImageData[idx] + 0.587 * smImageData[idx + 1] + 0.114 * smImageData[idx + 2]) / 255;
        if (brightness < 0.05) continue;
        const acidIdx = c & 3;
        smCells.push({
          x: homeX, y: homeY,
          brightness: brightness,
          acidIdx,
          restChar: SM_ACID[acidIdx],
          char: SM_ACID[acidIdx],
          phase: Math.random() * Math.PI * 2,
          cellSize: cellSize,
        });
      }
    }

    smEyeGeo = {
      eyeLX: (geo.cx - geo.eDX) / dpr,
      eyeRX: (geo.cx + geo.eDX) / dpr,
      eyeY:  geo.eY / dpr,
      cellSize,
    };

    return size;
  }

  let smSize = initSmileyPreview();

  const PREVIEW_WINK_PERIOD_S = 5.0;
  const PREVIEW_WINK_DURATION_S = 0.16;

  function drawSmileyPreview(time) {
    const w = smSize.w, h = smSize.h;
    const breath = 0.88 + 0.12 * Math.sin(time * 0.0012);

    smCtx.fillStyle = SM_BG;
    smCtx.fillRect(0, 0, w, h);

    const fontSize = smCells.length > 0 ? smCells[0].cellSize : 5;
    smCtx.font = `${fontSize}px "Courier New", monospace`;
    smCtx.textAlign = 'center';
    smCtx.textBaseline = 'middle';

    // Letter scroll and chromatic fringe — light versions of what the full
    // /smiley.html page does, sized down for a 280×280 card.
    const shift = Math.floor(time / 1800) & 3;
    const trip = 0.5 + 0.7 * (1 + Math.sin(time * 0.00028));

    // Cyan + magenta fringes
    smCtx.fillStyle = SM_CYAN;
    for (let i = 0; i < smCells.length; i++) {
      const cell = smCells[i];
      smCtx.globalAlpha = cell.brightness * breath * 0.45;
      smCtx.fillText(SM_ACID[(cell.acidIdx + shift) & 3], cell.x - trip, cell.y);
    }
    smCtx.fillStyle = SM_MAGENTA;
    for (let i = 0; i < smCells.length; i++) {
      const cell = smCells[i];
      smCtx.globalAlpha = cell.brightness * breath * 0.45;
      smCtx.fillText(SM_ACID[(cell.acidIdx + shift) & 3], cell.x + trip, cell.y);
    }

    // Main yellow layer
    smCtx.fillStyle = SM_YELLOW;
    for (let i = 0; i < smCells.length; i++) {
      const cell = smCells[i];
      smCtx.globalAlpha = cell.brightness * breath;
      smCtx.fillText(SM_ACID[(cell.acidIdx + shift) & 3], cell.x, cell.y);
    }
    smCtx.globalAlpha = 1;

    // Wink: bar of 'D' chars across each eye hole, periodic
    if (smEyeGeo) {
      const winkPhase = (time / 1000) % PREVIEW_WINK_PERIOD_S;
      if (winkPhase < PREVIEW_WINK_DURATION_S) {
        smCtx.fillStyle = SM_YELLOW;
        for (const ex of [smEyeGeo.eyeLX, smEyeGeo.eyeRX]) {
          for (let k = -2; k <= 2; k++) {
            smCtx.fillText('D', ex + k * smEyeGeo.cellSize, smEyeGeo.eyeY);
          }
        }
      }
    }
  }

  // --- Resize ---
  window.addEventListener('resize', function() {
    mbSize = initMirrorball();
    smSize = initSmileyPreview();
  });

  // --- Animate ---
  // Skip draws when the tab is hidden — RAF already throttles to ~1Hz in
  // background tabs, but explicit early-return avoids the canvas state churn.
  function animate(time) {
    requestAnimationFrame(animate);
    if (document.hidden) return;
    drawMirrorball(time);
    drawSmileyPreview(time);
  }

  requestAnimationFrame(animate);
})();
</script>

<script>
// Liquid light show, rendered as flowing ASCII "oil". A handful of metaball
// blobs drift, pulse, and merge like projected oil-and-water; a domain warp
// wobbles their edges. Each cell's blob density picks a glyph from a sparse->
// dense ramp, and a bleeding red->orange->yellow->green->cyan->violet->magenta
// palette marbles across the field. The cursor "heats" the oil — it adds a
// blooming blob and lifts local opacity. Honors prefers-reduced-motion: one
// static frame, no animation, no cursor tracking.
(function() {
  'use strict';

  const canvas = document.getElementById('ascii-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const FONT_SIZE = 13;             // px
  const FONT_FAMILY = "'Share Tech Mono', 'Courier New', monospace";
  const RAMP = " .`'\",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";
  const FRAME_MS = 50;              // ~20fps — slow oil, low CPU
  const ALPHA_SCALE = 0.85;         // ceiling on blob opacity
  const KNEE = 3.0;                 // metaball-sum -> [0,1) softness
  const WARP_AMP = 4;               // domain-warp wobble, in cells
  const HEAT_RADIUS = 8;            // cursor blob radius, in cells
  const rampMax = RAMP.length - 1;

  // Three oil colors that bleed into each other and cycle (magenta -> cyan ->
  // amber -> magenta). Pre-baked into a LUT of rgb() strings so the per-cell
  // hot loop never allocates or parses hex.
  const STOPS = ['#ff2bd6','#00e5ff','#ffb000'];
  const LUT_N = 96;
  const COLOR_LUT = (function() {
    const rgb = STOPS.map(h => [
      parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]);
    const n = rgb.length, out = new Array(LUT_N);
    for (let k = 0; k < LUT_N; k++) {
      const f = (k / LUT_N) * n, i = Math.floor(f), fr = f - i;
      const a = rgb[i % n], b = rgb[(i + 1) % n];
      out[k] = 'rgb(' + ((a[0] + (b[0] - a[0]) * fr) | 0) + ',' +
        ((a[1] + (b[1] - a[1]) * fr) | 0) + ',' + ((a[2] + (b[2] - a[2]) * fr) | 0) + ')';
    }
    return out;
  })();

  // Drifting oil blobs: base position (fraction of grid), orbit amplitude +
  // frequency per axis, phase, radius fraction of the short side, and a radius
  // pulse (freq/amp). Slow frequencies keep the motion molten, not jittery.
  const BLOBS = [
    { x: 0.30, y: 0.35, ax: 0.18, ay: 0.12, fx: 0.13, fy: 0.17, ph: 0.0, rf: 0.34, pf: 0.07, pa: 0.25 },
    { x: 0.70, y: 0.30, ax: 0.15, ay: 0.16, fx: 0.11, fy: 0.09, ph: 1.7, rf: 0.30, pf: 0.05, pa: 0.30 },
    { x: 0.50, y: 0.62, ax: 0.22, ay: 0.14, fx: 0.08, fy: 0.14, ph: 3.1, rf: 0.38, pf: 0.06, pa: 0.22 },
    { x: 0.25, y: 0.70, ax: 0.16, ay: 0.18, fx: 0.15, fy: 0.07, ph: 4.2, rf: 0.28, pf: 0.08, pa: 0.28 },
    { x: 0.78, y: 0.68, ax: 0.14, ay: 0.13, fx: 0.10, fy: 0.12, ph: 5.5, rf: 0.32, pf: 0.055, pa: 0.26 },
    { x: 0.50, y: 0.30, ax: 0.20, ay: 0.20, fx: 0.09, fy: 0.16, ph: 2.4, rf: 0.26, pf: 0.07, pa: 0.30 },
  ];

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let cols = 0, rows = 0, cellW = 0, cellH = 0, dpr = 1, lastFrame = 0;
  const mouse = { x: -9999, y: -9999 };
  // Per-frame blob state (centers + radii in cell coords), filled in paint().
  const bx = new Float64Array(BLOBS.length);
  const by = new Float64Array(BLOBS.length);
  const br2 = new Float64Array(BLOBS.length);  // R^2
  const bk = new Float64Array(BLOBS.length);   // 0.18 * R^2 (softening term)

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth, h = window.innerHeight;
    if (w === 0 || h === 0) return;
    canvas.width = Math.max(1, Math.floor(w * dpr));
    canvas.height = Math.max(1, Math.floor(h * dpr));
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.font = FONT_SIZE + 'px ' + FONT_FAMILY;
    ctx.textBaseline = 'top';
    const measured = ctx.measureText('M').width || FONT_SIZE * 0.6;
    cellW = measured;
    cellH = FONT_SIZE * 1.15;
    cols = Math.max(1, Math.floor(w / cellW));
    rows = Math.max(1, Math.floor(h / cellH));
  }

  function paint(time) {
    const t = reduced ? 0 : time * 0.001;
    const minDim = Math.min(cols, rows);
    const cx = mouse.x / cellW, cy = mouse.y / cellH;
    const mouseInside = !reduced &&
      mouse.x >= -24 && mouse.x <= window.innerWidth + 24 &&
      mouse.y >= -24 && mouse.y <= window.innerHeight + 24;
    const heatR2 = HEAT_RADIUS * HEAT_RADIUS;
    const heatK = 0.18 * heatR2;

    // Advance blob centers + radii for this frame.
    for (let i = 0; i < BLOBS.length; i++) {
      const b = BLOBS[i];
      bx[i] = (b.x + b.ax * Math.sin(t * b.fx + b.ph)) * cols;
      by[i] = (b.y + b.ay * Math.cos(t * b.fy + b.ph * 1.3)) * rows;
      const R = b.rf * (1 + b.pa * Math.sin(t * b.pf + b.ph)) * minDim;
      br2[i] = R * R;
      bk[i] = 0.18 * br2[i];
    }

    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        // Domain warp — wobble the sample point so blob edges ripple like oil.
        const wx = x + WARP_AMP * Math.sin(y * 0.06 + t * 0.5);
        const wy = y + WARP_AMP * Math.cos(x * 0.05 + t * 0.45);

        // Metaball density at the warped point.
        let sum = 0;
        for (let i = 0; i < BLOBS.length; i++) {
          const dx = wx - bx[i], dy = wy - by[i];
          sum += br2[i] / (dx * dx + dy * dy + bk[i]);
        }
        let heat = 0;
        if (mouseInside) {
          const dx = x - cx, dy = y - cy;
          heat = Math.exp(-(dx * dx + dy * dy) / (2 * heatR2));
          sum += heatR2 / (dx * dx + dy * dy + heatK) * 1.6;
        }

        const v = sum / (sum + KNEE);          // -> [0,1)
        const ch = RAMP[(v * rampMax) | 0];
        if (ch === ' ') continue;

        let alpha = v * ALPHA_SCALE + heat * 0.45;
        if (alpha > 1) alpha = 1;
        if (alpha <= 0.06) continue;

        // Marbled color: density tint + drifting diagonal flow through the LUT.
        let p = v * 0.5 + wx * 0.010 + wy * 0.006 + t * 0.04;
        p = p - Math.floor(p);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = COLOR_LUT[(p * LUT_N) | 0];
        ctx.fillText(ch, x * cellW, y * cellH);
      }
    }
    ctx.globalAlpha = 1;
  }

  function frame(time) {
    requestAnimationFrame(frame);
    if (document.hidden) return;
    if (time - lastFrame < FRAME_MS) return;
    lastFrame = time;
    if (cols === 0) resize();
    paint(time);
  }

  resize();
  window.addEventListener('resize', resize);

  if (reduced) {
    // No motion, no cursor reactivity — render one static frame and stop.
    paint(0);
  } else {
    window.addEventListener('mousemove', function(e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    }, { passive: true });
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
