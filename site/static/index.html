<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>benjaminconnelly.com</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0a0a0f;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: #ccc;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.title {
  text-align: center;
  margin-bottom: 48px;
  user-select: none;
}

.title h1 {
  font-size: clamp(18px, 3vw, 32px);
  color: #39FF14;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
}

.title .sub {
  font-size: clamp(10px, 1.5vw, 14px);
  color: #555;
  margin-top: 8px;
  letter-spacing: 3px;
}

.cards {
  display: flex;
  gap: clamp(24px, 6vw, 80px);
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 20px;
}

.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  transition: transform 0.3s ease;
}

.card:hover { transform: scale(1.05); }

.card .frame {
  width: clamp(160px, 25vw, 280px);
  height: clamp(160px, 25vw, 280px);
  border: 3px solid #333;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  background: #000;
}

.card:hover .frame {
  border-color: #39FF14;
  box-shadow: 0 0 30px rgba(57, 255, 20, 0.15);
}

.card .label {
  margin-top: 16px;
  font-size: clamp(12px, 1.8vw, 18px);
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #888;
  transition: color 0.3s;
}

.card:hover .label { color: #39FF14; }

canvas { display: block; width: 100%; height: 100%; }

.footer {
  position: fixed;
  bottom: 16px;
  font-size: 11px;
  color: #333;
  letter-spacing: 2px;
}
</style>
</head>
<body>


<div class="cards">
  <a class="card" href="/mirrorball.html">
    <div class="frame">
      <canvas id="mirrorball-preview"></canvas>
    </div>
  </a>

  <a class="card" href="/tb303.html">
    <div class="frame">
      <canvas id="tb303-preview"></canvas>
    </div>
  </a>
</div>


<script>
(function() {
  'use strict';

  // --- Mirrorball preview: spinning disco ball with reflected light ---
  const mbCanvas = document.getElementById('mirrorball-preview');
  const mbCtx = mbCanvas.getContext('2d');

  function initMirrorball() {
    const dpr = window.devicePixelRatio || 1;
    const rect = mbCanvas.getBoundingClientRect();
    mbCanvas.width = rect.width * dpr;
    mbCanvas.height = rect.height * dpr;
    mbCtx.scale(dpr, dpr);
    return { w: rect.width, h: rect.height };
  }

  let mbSize = initMirrorball();
  const mirrorTiles = [];

  // Generate tile positions on a sphere
  for (let lat = -80; lat <= 80; lat += 12) {
    const r = Math.cos(lat * Math.PI / 180);
    const circumference = Math.max(1, Math.round(r * 28));
    for (let i = 0; i < circumference; i++) {
      const lon = (i / circumference) * 360;
      mirrorTiles.push({
        lat: lat * Math.PI / 180,
        lon: lon * Math.PI / 180,
        flicker: Math.random()
      });
    }
  }

  function drawMirrorball(time) {
    const w = mbSize.w, h = mbSize.h;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.35;
    const rot = time * 0.0004;

    mbCtx.fillStyle = '#000';
    mbCtx.fillRect(0, 0, w, h);

    // Spotlight glow
    const grad = mbCtx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.4);
    grad.addColorStop(0, 'rgba(255,255,255,0.04)');
    grad.addColorStop(1, 'transparent');
    mbCtx.fillStyle = grad;
    mbCtx.fillRect(0, 0, w, h);

    // Reflected light beams
    const beamCount = 12;
    for (let i = 0; i < beamCount; i++) {
      const angle = rot * 2 + (i / beamCount) * Math.PI * 2;
      const bx = cx + Math.cos(angle) * radius * 2.5;
      const by = cy + Math.sin(angle) * radius * 2.5;
      const pulse = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.002 + i));
      mbCtx.beginPath();
      mbCtx.arc(bx, by, 3 + pulse * 4, 0, Math.PI * 2);
      mbCtx.fillStyle = `rgba(255,255,255,${0.15 * pulse})`;
      mbCtx.fill();
    }

    // Ball
    for (let i = 0; i < mirrorTiles.length; i++) {
      const t = mirrorTiles[i];
      const x3d = Math.cos(t.lat) * Math.sin(t.lon + rot);
      const y3d = Math.sin(t.lat);
      const z3d = Math.cos(t.lat) * Math.cos(t.lon + rot);

      if (z3d < -0.1) continue;

      const screenX = cx + x3d * radius;
      const screenY = cy + y3d * radius;
      const size = (z3d + 1) * 2.5 + 1;

      // Specular highlight based on angle to light source (top-right)
      const lightAngle = x3d * 0.5 + y3d * -0.5 + z3d * 0.7;
      const specular = Math.max(0, lightAngle);
      const flicker = 0.5 + 0.5 * Math.sin(time * 0.003 + t.flicker * 20);

      const brightness = Math.round((specular * 0.7 + 0.15 + flicker * 0.15) * 255);
      const r = Math.min(255, brightness);
      const g = Math.min(255, Math.round(brightness * 0.95));
      const b = Math.min(255, Math.round(brightness * 1.1));

      mbCtx.fillStyle = `rgb(${r},${g},${b})`;
      mbCtx.fillRect(screenX - size / 2, screenY - size / 2, size, size);
    }
  }

  // --- TB-303 preview: draw 303 shape, sample as ASCII ---
  const tbCanvas = document.getElementById('tb303-preview');
  const tbCtx = tbCanvas.getContext('2d');
  const tbOff = document.createElement('canvas');
  const tbOffCtx = tbOff.getContext('2d');

  const TB_BG = '#05020a';
  const TB_GREEN = '#39FF14';
  const TB_MAGENTA = '#FF00FF';
  const TB_RAMP = [' ', '.', ':', '-', '~', '+', '*', '#', '@', '%'];

  let tbCells = [];
  let tbImageData = null;

  // Draw a simplified 303 onto the offscreen canvas
  function draw303Preview(w, h) {
    tbOff.width = w;
    tbOff.height = h;
    tbOffCtx.clearRect(0, 0, w, h);

    // Fill card width, center vertically
    const refW = 400;
    const refH = 210;
    const scale = (w / refW) * 0.95;
    const ox = (w - refW * scale) / 2;
    const oy = (h - refH * scale) / 2;

    tbOffCtx.save();
    tbOffCtx.translate(ox, oy);
    tbOffCtx.scale(scale, scale);

    // Upper chassis — bright for ASCII readability
    const upperH = 115;
    const upperGrad = tbOffCtx.createLinearGradient(0, 0, 0, upperH);
    upperGrad.addColorStop(0, '#f0f0f0');
    upperGrad.addColorStop(1, '#b0b0b0');
    tbOffCtx.fillStyle = upperGrad;
    tbOffCtx.fillRect(0, 0, refW, upperH);

    // Bright top edge
    tbOffCtx.strokeStyle = '#f0f0f0';
    tbOffCtx.lineWidth = 2;
    tbOffCtx.strokeRect(1, 1, refW - 2, upperH - 2);

    // 6 knobs row
    const knobY = 42;
    const knobR = 14;
    for (let i = 0; i < 6; i++) {
      const kx = 100 + i * 45;
      // Shadow
      tbOffCtx.beginPath();
      tbOffCtx.arc(kx, knobY + 2, knobR + 2, 0, Math.PI * 2);
      tbOffCtx.fillStyle = '#404040';
      tbOffCtx.fill();
      // Outer
      tbOffCtx.beginPath();
      tbOffCtx.arc(kx, knobY, knobR, 0, Math.PI * 2);
      const kg = tbOffCtx.createRadialGradient(kx - 3, knobY - 4, 1, kx, knobY, knobR);
      kg.addColorStop(0, '#ffffff');
      kg.addColorStop(1, '#666666');
      tbOffCtx.fillStyle = kg;
      tbOffCtx.fill();
      // Cap
      tbOffCtx.beginPath();
      tbOffCtx.arc(kx, knobY, knobR * 0.5, 0, Math.PI * 2);
      tbOffCtx.fillStyle = '#f0f0f0';
      tbOffCtx.fill();
    }

    // Tempo knob (left, big)
    const bigR = 18;
    for (const bx of [38, refW - 38]) {
      tbOffCtx.beginPath();
      tbOffCtx.arc(bx, 78, bigR + 2, 0, Math.PI * 2);
      tbOffCtx.fillStyle = '#404040';
      tbOffCtx.fill();
      tbOffCtx.beginPath();
      tbOffCtx.arc(bx, 76, bigR, 0, Math.PI * 2);
      const bg = tbOffCtx.createRadialGradient(bx - 4, 72, 1, bx, 76, bigR);
      bg.addColorStop(0, '#ffffff');
      bg.addColorStop(1, '#666666');
      tbOffCtx.fillStyle = bg;
      tbOffCtx.fill();
      tbOffCtx.beginPath();
      tbOffCtx.arc(bx, 76, bigR * 0.5, 0, Math.PI * 2);
      tbOffCtx.fillStyle = '#f0f0f0';
      tbOffCtx.fill();
    }

    // Divider
    tbOffCtx.fillStyle = '#333333';
    tbOffCtx.fillRect(0, upperH, refW, 3);

    // Lower chassis
    const lowerY = upperH + 3;
    const lowerH = refH - lowerY;
    const lowerGrad = tbOffCtx.createLinearGradient(0, lowerY, 0, refH);
    lowerGrad.addColorStop(0, '#909090');
    lowerGrad.addColorStop(1, '#707070');
    tbOffCtx.fillStyle = lowerGrad;
    tbOffCtx.fillRect(0, lowerY, refW, lowerH);

    // Keyboard
    const keyX = 50;
    const keyY = lowerY + 8;
    const keyW = 260;
    const keyH = 40;
    const numWhite = 13;
    const wkW = keyW / numWhite;
    // White keys
    for (let i = 0; i < numWhite; i++) {
      tbOffCtx.fillStyle = '#f8f8f8';
      tbOffCtx.fillRect(keyX + i * wkW + 0.5, keyY, wkW - 1, keyH);
      tbOffCtx.strokeStyle = '#999';
      tbOffCtx.lineWidth = 0.5;
      tbOffCtx.strokeRect(keyX + i * wkW + 0.5, keyY, wkW - 1, keyH);
    }
    // Black keys
    const bk = [1, 1, 0, 1, 1, 1, 0, 1, 1, 0, 1, 1];
    for (let i = 0; i < bk.length; i++) {
      if (bk[i]) {
        tbOffCtx.fillStyle = '#111111';
        tbOffCtx.fillRect(keyX + (i + 0.6) * wkW, keyY, wkW * 0.55, keyH * 0.6);
      }
    }

    // Step buttons row
    const stepY = lowerY + 58;
    const stepStartX = 55;
    const stepW = 22;
    for (let i = 0; i < 12; i++) {
      // LED
      tbOffCtx.beginPath();
      tbOffCtx.arc(stepStartX + i * stepW + 8, stepY - 6, 2, 0, Math.PI * 2);
      tbOffCtx.fillStyle = '#ff3333';
      tbOffCtx.fill();
      // Button
      tbOffCtx.fillStyle = '#888888';
      tbOffCtx.fillRect(stepStartX + i * stepW, stepY, 16, 10);
    }

    tbOffCtx.restore();
  }

  function initTb303() {
    const dpr = window.devicePixelRatio || 1;
    const rect = tbCanvas.getBoundingClientRect();
    tbCanvas.width = rect.width * dpr;
    tbCanvas.height = rect.height * dpr;
    tbCtx.scale(dpr, dpr);
    const size = { w: rect.width, h: rect.height };

    // Draw 303 shape to offscreen canvas
    draw303Preview(rect.width * dpr, rect.height * dpr);
    const raw = tbOffCtx.getImageData(0, 0, rect.width * dpr, rect.height * dpr);
    tbImageData = raw.data;

    // Build ASCII grid by sampling brightness
    tbCells = [];
    const cellSize = Math.max(4, Math.round(5 * (size.w / 280)));
    const cols = Math.ceil(size.w / cellSize);
    const rows = Math.ceil(size.h / cellSize);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const homeX = c * cellSize + cellSize / 2;
        const homeY = r * cellSize + cellSize / 2;
        const sx = Math.round(homeX * dpr);
        const sy = Math.round(homeY * dpr);
        if (sx < 0 || sx >= rect.width * dpr || sy < 0 || sy >= rect.height * dpr) continue;
        const idx = (sy * rect.width * dpr + sx) * 4;
        const brightness = (0.299 * tbImageData[idx] + 0.587 * tbImageData[idx + 1] + 0.114 * tbImageData[idx + 2]) / 255;
        if (brightness < 0.02) continue;
        const charIdx = Math.min(TB_RAMP.length - 1, Math.floor(brightness * TB_RAMP.length));
        tbCells.push({
          x: homeX, y: homeY,
          brightness: brightness,
          restChar: TB_RAMP[charIdx],
          char: TB_RAMP[charIdx],
          phase: Math.random() * Math.PI * 2,
          cellSize: cellSize,
          // Flag step button region for sequencer animation
          isStep: homeY / size.h > 0.75 && homeX / size.w > 0.1 && homeX / size.w < 0.85,
          stepCol: c
        });
      }
    }

    return size;
  }

  let tbSize = initTb303();

  const STEP_MS = 428;
  const NUM_STEPS = 12;
  const ACCENTS = [1, 0, 0, 1, 0, 0, 1, 0, 1, 0, 0, 1];

  function drawTb303(time) {
    const w = tbSize.w, h = tbSize.h;
    const currentStep = Math.floor(time / STEP_MS) % NUM_STEPS;
    const stepPhase = (time % STEP_MS) / STEP_MS;
    const breath = 0.85 + 0.15 * Math.sin(time * 0.0015);

    tbCtx.fillStyle = TB_BG;
    tbCtx.fillRect(0, 0, w, h);

    const fontSize = tbCells.length > 0 ? tbCells[0].cellSize : 5;
    tbCtx.font = `${fontSize}px "Courier New", monospace`;
    tbCtx.textAlign = 'center';
    tbCtx.textBaseline = 'middle';
    tbCtx.shadowBlur = 0;

    // Find step region bounds for mapping step indices
    let stepMinX = Infinity, stepMaxX = -Infinity;
    for (let i = 0; i < tbCells.length; i++) {
      if (tbCells[i].isStep) {
        if (tbCells[i].x < stepMinX) stepMinX = tbCells[i].x;
        if (tbCells[i].x > stepMaxX) stepMaxX = tbCells[i].x;
      }
    }
    const stepRange = stepMaxX - stepMinX;

    for (let i = 0; i < tbCells.length; i++) {
      const cell = tbCells[i];
      let alpha = cell.brightness * breath;
      let color = TB_GREEN;
      let char = cell.char;

      // Twinkle
      if (Math.random() < 0.003 && cell.brightness > 0.05) {
        const baseIdx = Math.floor(cell.brightness * TB_RAMP.length);
        const shift = Math.random() < 0.5 ? -1 : 1;
        cell.char = TB_RAMP[Math.max(1, Math.min(TB_RAMP.length - 1, baseIdx + shift))];
        char = cell.char;
      }

      // Animate step region with sequencer
      if (cell.isStep && stepRange > 0) {
        const stepIdx = Math.floor(((cell.x - stepMinX) / stepRange) * NUM_STEPS);
        if (stepIdx >= 0 && stepIdx < NUM_STEPS) {
          const isActive = stepIdx === currentStep;
          const wasRecent = stepIdx === (currentStep - 1 + NUM_STEPS) % NUM_STEPS;
          if (isActive) {
            color = ACCENTS[stepIdx] ? TB_MAGENTA : TB_GREEN;
            alpha = 1;
            char = '#';
            tbCtx.shadowBlur = 4;
            tbCtx.shadowColor = color;
          } else if (wasRecent) {
            alpha = cell.brightness * 0.6 * (1 - stepPhase);
          }
        }
      }

      tbCtx.globalAlpha = alpha;
      tbCtx.fillStyle = color;
      tbCtx.fillText(char, cell.x, cell.y);
      if (tbCtx.shadowBlur > 0) tbCtx.shadowBlur = 0;
    }

    tbCtx.globalAlpha = 1;

    // Scanline effect
    tbCtx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < h; y += 3) {
      tbCtx.fillRect(0, y, w, 1);
    }
  }

  // --- Resize ---
  window.addEventListener('resize', function() {
    mbSize = initMirrorball();
    tbSize = initTb303();
  });

  // --- Animate ---
  function animate(time) {
    requestAnimationFrame(animate);
    drawMirrorball(time);
    drawTb303(time);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
