<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0a0a0f;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: #ccc;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.title {
  text-align: center;
  margin-bottom: 48px;
  user-select: none;
}

.title h1 {
  font-size: clamp(18px, 3vw, 32px);
  color: #39FF14;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
}

.title .sub {
  font-size: clamp(10px, 1.5vw, 14px);
  color: #555;
  margin-top: 8px;
  letter-spacing: 3px;
}

.cards {
  display: flex;
  gap: clamp(24px, 6vw, 80px);
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 20px;
}

.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  transition: transform 0.3s ease;
}

.card:hover { transform: scale(1.05); }

.card .frame {
  width: clamp(160px, 25vw, 280px);
  height: clamp(160px, 25vw, 280px);
  border: 3px solid #333;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  background: #000;
}

.card:hover .frame {
  border-color: #39FF14;
  box-shadow: 0 0 30px rgba(57, 255, 20, 0.15);
}

.card .label {
  margin-top: 16px;
  font-size: clamp(12px, 1.8vw, 18px);
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #888;
  transition: color 0.3s;
}

.card:hover .label { color: #39FF14; }

.card .warn {
  margin-top: 10px;
  max-width: clamp(160px, 25vw, 280px);
  font-size: 10px;
  letter-spacing: 1px;
  text-align: center;
  color: #555;
  line-height: 1.4;
  /* Reserve two lines of height on every card so the frames align
     regardless of whether the card has a warning. */
  min-height: 2.8em;
}

canvas { display: block; width: 100%; height: 100%; }

/* Skip link for keyboard users — hidden until focused. */
.skip-link {
  position: absolute; left: -9999px; top: auto;
  width: 1px; height: 1px; overflow: hidden;
}
.skip-link:focus {
  position: fixed; left: 16px; top: 16px; width: auto; height: auto;
  padding: 8px 14px; background: #0a0a0f; color: #39FF14;
  border: 1px solid #39FF14; font: 13px 'Share Tech Mono', monospace;
  z-index: 100;
}

/* Visually hide the h1 — it's there for screen readers and search engines
   but the visual identity is the two cards, not a heading. */
.visually-hidden {
  position: absolute; clip: rect(0 0 0 0); width: 1px; height: 1px;
  overflow: hidden; white-space: nowrap;
}

/* Ambient cursor-reactive ASCII field behind the gallery. Fixed, full-
   viewport, out of flow so it never disturbs the centered cards. The cards
   and skip-link stack above it; pointer-events:none keeps hover/click on
   the cards (cursor is tracked on window, not on this canvas). */
#ascii-bg {
  position: fixed; inset: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}
main.cards { position: relative; z-index: 1; }

<body>

<canvas id="ascii-bg" aria-hidden="true"></canvas>

<a class="skip-link" href="#cards">skip to gallery</a>

<h1 class="visually-hidden">benjaminconnelly.com — canvas gallery</h1>

<main id="cards" class="cards" role="main" aria-label="Canvas gallery">
  <a class="card" href="/mirrorball.html" aria-label="Mirrorball — disco ball physics simulation">
    <div class="frame">
      <canvas id="mirrorball-preview" aria-hidden="true"></canvas>
    </div>
    <div class="warn" aria-hidden="true"></div>
  </a>

  <a class="card" href="/smiley.html" aria-label="Acid Smiley — psychedelic ASCII particle field">
    <div class="frame">
      <canvas id="smiley-preview" aria-hidden="true"></canvas>
    </div>
    <div class="warn">
      ⚠ contains strobe + sustained flashing — may trigger photosensitive seizures
    </div>
  </a>
</main>


<script>
(function() {
  'use strict';

  // --- Mirrorball preview: spinning disco ball with reflected light ---
  const mbCanvas = document.getElementById('mirrorball-preview');
  const mbCtx = mbCanvas.getContext('2d');

  function initMirrorball() {
    const dpr = window.devicePixelRatio || 1;
    const rect = mbCanvas.getBoundingClientRect();
    mbCanvas.width = rect.width * dpr;
    mbCanvas.height = rect.height * dpr;
    mbCtx.scale(dpr, dpr);
    return { w: rect.width, h: rect.height };
  }

  let mbSize = initMirrorball();
  const mirrorTiles = [];

  // Generate tile positions on a sphere
  for (let lat = -80; lat <= 80; lat += 12) {
    const r = Math.cos(lat * Math.PI / 180);
    const circumference = Math.max(1, Math.round(r * 28));
    for (let i = 0; i < circumference; i++) {
      const lon = (i / circumference) * 360;
      mirrorTiles.push({
        lat: lat * Math.PI / 180,
        lon: lon * Math.PI / 180,
        flicker: Math.random()
      });
    }
  }

  function drawMirrorball(time) {
    const w = mbSize.w, h = mbSize.h;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.35;
    const rot = time * 0.0004;

    mbCtx.fillStyle = '#000';
    mbCtx.fillRect(0, 0, w, h);

    // Spotlight glow
    const grad = mbCtx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.4);
    grad.addColorStop(0, 'rgba(255,255,255,0.04)');
    grad.addColorStop(1, 'transparent');
    mbCtx.fillStyle = grad;
    mbCtx.fillRect(0, 0, w, h);

    // Reflected light beams
    const beamCount = 12;
    for (let i = 0; i < beamCount; i++) {
      const angle = rot * 2 + (i / beamCount) * Math.PI * 2;
      const bx = cx + Math.cos(angle) * radius * 2.5;
      const by = cy + Math.sin(angle) * radius * 2.5;
      const pulse = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.002 + i));
      mbCtx.beginPath();
      mbCtx.arc(bx, by, 3 + pulse * 4, 0, Math.PI * 2);
      mbCtx.fillStyle = `rgba(255,255,255,${0.15 * pulse})`;
      mbCtx.fill();
    }

    // Ball
    for (let i = 0; i < mirrorTiles.length; i++) {
      const t = mirrorTiles[i];
      const x3d = Math.cos(t.lat) * Math.sin(t.lon + rot);
      const y3d = Math.sin(t.lat);
      const z3d = Math.cos(t.lat) * Math.cos(t.lon + rot);

      if (z3d < -0.1) continue;

      const screenX = cx + x3d * radius;
      const screenY = cy + y3d * radius;
      const size = (z3d + 1) * 2.5 + 1;

      // Specular highlight based on angle to light source (top-right)
      const lightAngle = x3d * 0.5 + y3d * -0.5 + z3d * 0.7;
      const specular = Math.max(0, lightAngle);
      const flicker = 0.5 + 0.5 * Math.sin(time * 0.003 + t.flicker * 20);

      const brightness = Math.round((specular * 0.7 + 0.15 + flicker * 0.15) * 255);
      const r = Math.min(255, brightness);
      const g = Math.min(255, Math.round(brightness * 0.95));
      const b = Math.min(255, Math.round(brightness * 1.1));

      mbCtx.fillStyle = `rgb(${r},${g},${b})`;
      mbCtx.fillRect(screenX - size / 2, screenY - size / 2, size, size);
    }
  }

  // --- Smiley preview: draw ☻ shape, sample as ASCII ---
  const smCanvas = document.getElementById('smiley-preview');
  const smCtx = smCanvas.getContext('2d');
  const smOff = document.createElement('canvas');
  const smOffCtx = smOff.getContext('2d');

  const SM_BG = '#05020a';
  const SM_YELLOW = '#ffd700';
  const SM_CYAN = '#00e0ff';
  const SM_MAGENTA = '#ff00d0';
  // Preview tiles "ACID" across the face (matches /smiley.html aesthetic).
  // No BG grid or barrel warp in the card — the full page carries that load;
  // at 280×280 the warp is too subtle to read and the BG grid clutters.
  const SM_ACID = ['A', 'C', 'I', 'D'];

  let smCells = [];
  let smImageData = null;
  let smEyeGeo = null;  // { eyeLX, eyeRX, eyeY, cellSize } for wink overlay

  function drawSmileyOff(w, h) {
    smOff.width = w;
    smOff.height = h;
    smOffCtx.clearRect(0, 0, w, h);

    const size = Math.min(w, h) * 0.82;
    const cx = w / 2, cy = h / 2;
    const r = size / 2;

    // Yellow face disc (sampled by brightness only — color is irrelevant here)
    const grd = smOffCtx.createRadialGradient(cx - r * 0.2, cy - r * 0.3, r * 0.1, cx, cy, r);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.85, '#e0e0e0');
    grd.addColorStop(1, '#a0a0a0');
    smOffCtx.fillStyle = grd;
    smOffCtx.beginPath();
    smOffCtx.arc(cx, cy, r, 0, Math.PI * 2);
    smOffCtx.fill();

    // Eyes (black voids)
    const eDX = r * 0.33;
    const eY  = cy - r * 0.18;
    const eR  = r * 0.11;
    smOffCtx.fillStyle = '#000';
    smOffCtx.beginPath();
    smOffCtx.arc(cx - eDX, eY, eR, 0, Math.PI * 2);
    smOffCtx.arc(cx + eDX, eY, eR, 0, Math.PI * 2);
    smOffCtx.fill();

    // Mouth arc
    smOffCtx.strokeStyle = '#000';
    smOffCtx.lineWidth = r * 0.10;
    smOffCtx.lineCap = 'round';
    smOffCtx.beginPath();
    smOffCtx.arc(cx, cy + r * 0.07, r * 0.52, 0.18 * Math.PI, 0.82 * Math.PI, false);
    smOffCtx.stroke();

    return { cx, cy, r, eDX, eY };
  }

  function initSmileyPreview() {
    const dpr = window.devicePixelRatio || 1;
    const rect = smCanvas.getBoundingClientRect();
    smCanvas.width = rect.width * dpr;
    smCanvas.height = rect.height * dpr;
    smCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const size = { w: rect.width, h: rect.height };

    const geo = drawSmileyOff(rect.width * dpr, rect.height * dpr);
    const raw = smOffCtx.getImageData(0, 0, rect.width * dpr, rect.height * dpr);
    smImageData = raw.data;

    const cellSize = Math.max(4, Math.round(5 * (size.w / 280)));
    const cols = Math.ceil(size.w / cellSize);
    const rows = Math.ceil(size.h / cellSize);
    smCells = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const homeX = c * cellSize + cellSize / 2;
        const homeY = r * cellSize + cellSize / 2;
        const sx = Math.round(homeX * dpr);
        const sy = Math.round(homeY * dpr);
        if (sx < 0 || sx >= smCanvas.width || sy < 0 || sy >= smCanvas.height) continue;
        // Use the INTEGER canvas pixel width for stride — `rect.width * dpr`
        // is fractional on non-integer DPRs (e.g. 1.04 in Playwright) and
        // produces off-by-N sampling that bleeds outside the disc.
        const idx = (sy * smCanvas.width + sx) * 4;
        const brightness = (0.299 * smImageData[idx] + 0.587 * smImageData[idx + 1] + 0.114 * smImageData[idx + 2]) / 255;
        if (brightness < 0.05) continue;
        const acidIdx = c & 3;
        smCells.push({
          x: homeX, y: homeY,
          brightness: brightness,
          acidIdx,
          restChar: SM_ACID[acidIdx],
          char: SM_ACID[acidIdx],
          phase: Math.random() * Math.PI * 2,
          cellSize: cellSize,
        });
      }
    }

    smEyeGeo = {
      eyeLX: (geo.cx - geo.eDX) / dpr,
      eyeRX: (geo.cx + geo.eDX) / dpr,
      eyeY:  geo.eY / dpr,
      cellSize,
    };

    return size;
  }

  let smSize = initSmileyPreview();

  const PREVIEW_WINK_PERIOD_S = 5.0;
  const PREVIEW_WINK_DURATION_S = 0.16;

  function drawSmileyPreview(time) {
    const w = smSize.w, h = smSize.h;
    const breath = 0.88 + 0.12 * Math.sin(time * 0.0012);

    smCtx.fillStyle = SM_BG;
    smCtx.fillRect(0, 0, w, h);

    const fontSize = smCells.length > 0 ? smCells[0].cellSize : 5;
    smCtx.font = `${fontSize}px "Courier New", monospace`;
    smCtx.textAlign = 'center';
    smCtx.textBaseline = 'middle';

    // Letter scroll and chromatic fringe — light versions of what the full
    // /smiley.html page does, sized down for a 280×280 card.
    const shift = Math.floor(time / 1800) & 3;
    const trip = 0.5 + 0.7 * (1 + Math.sin(time * 0.00028));

    // Cyan + magenta fringes
    smCtx.fillStyle = SM_CYAN;
    for (let i = 0; i < smCells.length; i++) {
      const cell = smCells[i];
      smCtx.globalAlpha = cell.brightness * breath * 0.45;
      smCtx.fillText(SM_ACID[(cell.acidIdx + shift) & 3], cell.x - trip, cell.y);
    }
    smCtx.fillStyle = SM_MAGENTA;
    for (let i = 0; i < smCells.length; i++) {
      const cell = smCells[i];
      smCtx.globalAlpha = cell.brightness * breath * 0.45;
      smCtx.fillText(SM_ACID[(cell.acidIdx + shift) & 3], cell.x + trip, cell.y);
    }

    // Main yellow layer
    smCtx.fillStyle = SM_YELLOW;
    for (let i = 0; i < smCells.length; i++) {
      const cell = smCells[i];
      smCtx.globalAlpha = cell.brightness * breath;
      smCtx.fillText(SM_ACID[(cell.acidIdx + shift) & 3], cell.x, cell.y);
    }
    smCtx.globalAlpha = 1;

    // Wink: bar of 'D' chars across each eye hole, periodic
    if (smEyeGeo) {
      const winkPhase = (time / 1000) % PREVIEW_WINK_PERIOD_S;
      if (winkPhase < PREVIEW_WINK_DURATION_S) {
        smCtx.fillStyle = SM_YELLOW;
        for (const ex of [smEyeGeo.eyeLX, smEyeGeo.eyeRX]) {
          for (let k = -2; k <= 2; k++) {
            smCtx.fillText('D', ex + k * smEyeGeo.cellSize, smEyeGeo.eyeY);
          }
        }
      }
    }
  }

  // --- Resize ---
  window.addEventListener('resize', function() {
    mbSize = initMirrorball();
    smSize = initSmileyPreview();
  });

  // --- Animate ---
  // Skip draws when the tab is hidden — RAF already throttles to ~1Hz in
  // background tabs, but explicit early-return avoids the canvas state churn.
  function animate(time) {
    requestAnimationFrame(animate);
    if (document.hidden) return;
    drawMirrorball(time);
    drawSmileyPreview(time);
  }

  requestAnimationFrame(animate);
})();
</script>

<script>
// Ambient ASCII field — vanilla port of the cursor-reactive "ascii-hero"
// background. Monochrome phosphor-green, low base opacity; the cursor pushes
// a ripple wake through the field and lifts a soft spotlight. A static base
// field (radial brightness + sine stripes) plus a slow drifting wave gives it
// life when the pointer is idle. Honors prefers-reduced-motion: one static
// frame, no animation, no cursor tracking.
(function() {
  'use strict';

  const canvas = document.getElementById('ascii-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  // Tunables — kept quiet so the field reads as texture, not centerpiece.
  // Blue atmospheric ramp, dark -> light. Mapped to cell DENSITY (not time):
  // sparse cells take the deep blues, dense cells the hazy light blues, giving
  // the layered-ridge depth of distant mountains. No time cycling.
  const PALETTE = ['#00547B', '#00729C', '#449DC4', '#64A9CA', '#A3BECC'];
  const PMAX = PALETTE.length - 1;
  const FONT_SIZE = 12;             // px
  const FONT_FAMILY = "'Share Tech Mono', 'Courier New', monospace";
  const RAMP = " .`'\",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";
  const BASE_OPACITY = 0.12;        // resting alpha
  const SPOTLIGHT_OPACITY = 0.55;   // alpha at the cursor center
  const SPOTLIGHT_RADIUS = 9;       // cells
  const RIPPLE_STRENGTH = 1.4;
  const RIPPLE_RADIUS = 6;          // cells
  const FRAME_MS = 50;              // ~20fps — ambient, low CPU

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let cols = 0, rows = 0, cellW = 0, cellH = 0, dpr = 1;
  let baseField = new Float32Array(0);
  let lastFrame = 0;
  const mouse = { x: -9999, y: -9999 };
  const rampMax = RAMP.length - 1;
  const spotR2 = SPOTLIGHT_RADIUS * SPOTLIGHT_RADIUS * 2;

  function seed() {
    baseField = new Float32Array(cols * rows);
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const nx = (x / cols) * 2 - 1;
        const ny = (y / rows) * 2 - 1;
        const r = Math.sqrt(nx * nx + ny * ny);
        const stripes = 0.5 + 0.5 * Math.sin(nx * 6 + ny * 2);
        const radial = 1 - Math.min(1, r * 1.2);
        baseField[y * cols + x] = 0.25 * stripes + 0.55 * radial;
      }
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth, h = window.innerHeight;
    if (w === 0 || h === 0) return;
    canvas.width = Math.max(1, Math.floor(w * dpr));
    canvas.height = Math.max(1, Math.floor(h * dpr));
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.font = FONT_SIZE + 'px ' + FONT_FAMILY;
    ctx.textBaseline = 'top';
    const measured = ctx.measureText('M').width || FONT_SIZE * 0.6;
    cellW = measured;
    cellH = FONT_SIZE * 1.15;
    cols = Math.max(1, Math.floor(w / cellW));
    rows = Math.max(1, Math.floor(h / cellH));
    seed();
  }

  function paint(time) {
    const t = time * 0.001;
    const animate = !reduced;
    const cx = mouse.x / cellW;
    const cy = mouse.y / cellH;
    const mouseInside = animate &&
      mouse.x >= -24 && mouse.x <= window.innerWidth + 24 &&
      mouse.y >= -24 && mouse.y <= window.innerHeight + 24;

    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const base = baseField[y * cols + x];
        const wave = animate
          ? 0.15 * Math.sin(x * 0.18 + t * 1.4) * Math.cos(y * 0.22 - t * 1.1)
          : 0;

        let ripple = 0, d2 = 0;
        if (mouseInside) {
          const dx = x - cx;
          const dy = (y - cy) * 1.8;
          d2 = dx * dx + dy * dy;
          const d = Math.sqrt(d2);
          ripple = RIPPLE_STRENGTH * Math.exp(-d2 / 80) -
            0.6 * Math.exp(-((d - RIPPLE_RADIUS) * (d - RIPPLE_RADIUS)) / 30);
        }

        const v = Math.max(0, Math.min(1, base + wave + ripple));
        const ch = RAMP[Math.floor(v * rampMax)];
        if (ch === ' ') continue;

        let alpha = BASE_OPACITY;
        if (mouseInside) {
          const spot = Math.exp(-d2 / spotR2);
          alpha = BASE_OPACITY + (SPOTLIGHT_OPACITY - BASE_OPACITY) * spot;
          if (alpha > 1) alpha = 1;
        }
        if (alpha <= 0.01) continue;

        ctx.globalAlpha = alpha;
        ctx.fillStyle = PALETTE[Math.floor(v * PMAX)];
        ctx.fillText(ch, x * cellW, y * cellH);
      }
    }
    ctx.globalAlpha = 1;
  }

  function frame(time) {
    requestAnimationFrame(frame);
    if (document.hidden) return;
    if (time - lastFrame < FRAME_MS) return;
    lastFrame = time;
    if (cols === 0) resize();
    paint(time);
  }

  resize();
  window.addEventListener('resize', resize);

  if (reduced) {
    // No motion, no cursor reactivity — render one static frame and stop.
    paint(0);
  } else {
    window.addEventListener('mousemove', function(e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    }, { passive: true });
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
